<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>에코 맵 - 우리동네 환경 센터 찾기</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { width: 100%; height: 100%; overflow: hidden; font-family: 'Malgun Gothic', sans-serif; }
        
        .container { display: flex; width: 100%; height: 100vh; }
        
        /* 사이드바 및 탭 설정 */
        .sidebar { width: 320px; height: 100%; background: #f8f9fa; display: flex; flex-direction: column; border-right: 1px solid #ddd; z-index: 10; }
        
        .tab-menu { display: flex; background: #eee; }
        .tab-btn { flex: 1; padding: 15px; border: none; cursor: pointer; font-weight: bold; background: #ddd; transition: 0.3s; }
        .tab-btn.active { background: #fff; color: #28a745; border-bottom: 3px solid #28a745; }

        .search-box { padding: 15px; background: #fff; border-bottom: 1px solid #eee; }
        .search-box input { width: 70%; padding: 8px; border: 1px solid #ccc; border-radius: 4px; }
        .search-box button { width: 25%; padding: 8px; background: #333; color: white; border: none; cursor: pointer; border-radius: 4px; }

        #result-list { flex: 1; overflow-y: auto; list-style: none; padding: 10px; }
        .item { padding: 15px; border-bottom: 1px solid #eee; cursor: pointer; background: white; margin-bottom: 5px; border-radius: 4px; }
        .item:hover { background: #f1f8f1; }
        .item strong { color: #333; }
        .item small { color: #777; display: block; margin-top: 5px; }

        /* 지도 영역 */
        #map { flex: 1; height: 100%; }

        /* 커스텀 말풍선(인포윈도우) 스타일 */
        .custom-overlay { padding: 10px; background: white; border: 1px solid #ccc; border-radius: 5px; font-size: 13px; min-width: 150px; box-shadow: 2px 2px 5px rgba(0,0,0,0.1); }
        .custom-overlay a { display: inline-block; margin-top: 5px; color: #28a745; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <div class="sidebar">
        <div class="tab-menu">
            <button class="tab-btn active" onclick="changeCategory('재활용 센터', this)">재활용 센터</button>
            <button class="tab-btn" onclick="changeCategory('환경교육 센터', this)">환경교육 센터</button>
        </div>
        
        <div class="search-box">
            <input type="text" id="keyword" placeholder="지역 검색 (예: 강남)" onkeypress="if(event.keyCode==13) searchPlaces()">
            <button onclick="searchPlaces()">검색</button>
        </div>
        
        <ul id="result-list"></ul>
    </div>
    <div id="map"></div>
</div>

<script type="text/javascript" src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=21ef28306588a8b20e20213f3c8fe6b8&libraries=services&autoload=false"></script>

<script>
    let map;
    let placeSearch;
    let markers = [];
    let currentCategory = "재활용 센터";
    let infoWindow = new kakao.maps.InfoWindow({ zIndex: 1 });

    // 지도 초기화
    kakao.maps.load(function() {
        const container = document.getElementById('map');
        const options = {
            center: new kakao.maps.LatLng(37.5668, 126.9786), 
            level: 5
        };
        map = new kakao.maps.Map(container, options);
        placeSearch = new kakao.maps.services.Places();

        // 내 위치 표시 (Geolocation)
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(function(pos) {
                const myPos = new kakao.maps.LatLng(pos.coords.latitude, pos.coords.longitude);
                map.setCenter(myPos);
                
                // 내 위치는 특별한 파란색 원형 마커로 표시
                const circleMarker = new kakao.maps.CustomOverlay({
                    position: myPos,
                    content: '<div style="width:15px;height:15px;background:blue;border:2px solid white;border-radius:50%;box-shadow:0 0 5px rgba(0,0,0,0.5);"></div>'
                });
                circleMarker.setMap(map);
            });
        }
    });

    // 탭 클릭 시 카테고리 변경
    function changeCategory(category, btn) {
        currentCategory = category;
        
        // 탭 버튼 UI 변경
        const btns = document.querySelectorAll('.tab-btn');
        btns.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');

        // 기존 데이터 지우기
        removeMarkers();
        document.getElementById('result-list').innerHTML = "";
        
        // 해당 카테고리로 자동 검색
        const keywordInput = document.getElementById('keyword').value;
        if(keywordInput) searchPlaces();
    }

    // 장소 검색 실행
    function searchPlaces() {
        const userWord = document.getElementById('keyword').value;
        const finalQuery = userWord + " " + currentCategory; // 예: 강남 + 재활용 센터

        if (!userWord.trim()) return alert("지역명을 입력해주세요!");

        placeSearch.keywordSearch(finalQuery, function(data, status) {
            if (status === kakao.maps.services.Status.OK) {
                displayResults(data);
            } else {
                alert("검색 결과가 없습니다.");
            }
        });
    }

    // 결과 표시
    function displayResults(places) {
        const listEl = document.getElementById('result-list');
        const bounds = new kakao.maps.LatLngBounds();
        
        listEl.innerHTML = "";
        removeMarkers();

        // 카테고리에 따른 마커 이미지 설정 (카카오 제공 기본 이미지 주소 활용)
        const blueMarkerSrc = "https://t1.daumcdn.net/localimg/localimages/07/mapapidoc/markerStar.png"; // 재활용(파랑 느낌)
        const redMarkerSrc = "https://t1.daumcdn.net/localimg/localimages/07/mapapidoc/marker_red.png"; // 교육(빨강)
        
        const imageSize = new kakao.maps.Size(24, 35);
        const markerImage = new kakao.maps.MarkerImage(
            currentCategory === "재활용 센터" ? blueMarkerSrc : redMarkerSrc, 
            imageSize
        );

        places.forEach(p => {
            const pos = new kakao.maps.LatLng(p.y, p.x);
            
            const marker = new kakao.maps.Marker({
                position: pos,
                map: map,
                image: markerImage
            });
            
            markers.push(marker);

            // 마커 클릭 시 커스텀 말풍선 표시
            kakao.maps.event.addListener(marker, 'click', function() {
                const content = `
                    <div class="custom-overlay">
                        <strong>${p.place_name}</strong><br>
                        <small>📞 ${p.phone ? p.phone : '번호없음'}</small><br>
                        <a href="https://map.kakao.com/link/map/${p.id}" target="_blank">상세보기 ></a>
                    </div>
                `;
                infoWindow.setContent(content);
                infoWindow.open(map, marker);
            });

            // 리스트 생성
            const li = document.createElement('li');
            li.className = 'item';
            li.innerHTML = `<strong>${p.place_name}</strong>
