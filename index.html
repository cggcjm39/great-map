<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kakao Map Project</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { width: 100%; height: 100%; font-family: sans-serif; overflow: hidden; }
        
        /* 화면 2분할 레이아웃 */
        .main-wrapper { display: flex; width: 100%; height: 100vh; }
        
        .sidebar { 
            width: 350px; height: 100%; background: #fdfdfd; 
            border-right: 1px solid #ccc; display: flex; flex-direction: column; 
            z-index: 10;
        }

        .search-area { padding: 20px; background: #fee500; }
        .search-area input { width: 70%; padding: 10px; border: 1px solid #ddd; border-radius: 4px; }
        .search-area button { width: 25%; padding: 10px; background: #3c1e1e; color: white; border: none; cursor: pointer; border-radius: 4px; }

        #result-list { flex: 1; overflow-y: auto; list-style: none; }
        .list-item { padding: 15px; border-bottom: 1px solid #eee; cursor: pointer; }
        .list-item:hover { background: #f1f1f1; }

        #map { flex: 1; height: 100%; }
    </style>
</head>
<body>

<div class="main-wrapper">
    <div class="sidebar">
        <div class="search-area">
            <input type="text" id="keyword" placeholder="장소 검색..." onkeypress="if(event.keyCode==13) searchPlaces()">
            <button onclick="searchPlaces()">검색</button>
        </div>
        <ul id="result-list"></ul>
    </div>
    <div id="map"></div>
</div>

<script type="text/javascript" src="//dapi.kakao.com/v2/maps/sdk.js?appkey=21ef28306588a8b20e20213f3c8fe6b8&libraries=services&autoload=false"></script>

<script>
    let map;
    let placeService;
    let markers = [];

    // 지도가 완전히 로드된 후 실행되도록 보장
    kakao.maps.load(function() {
        const container = document.getElementById('map');
        const options = {
            center: new kakao.maps.LatLng(37.566826, 126.9786567), // 기본 위치 (서울시청)
            level: 5
        };

        map = new kakao.maps.Map(container, options);
        placeService = new kakao.maps.services.Places();

        // 위치 권한 요청
        askLocationPermission();
    });

    function askLocationPermission() {
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(function(position) {
                const lat = position.coords.latitude;
                const lon = position.coords.longitude;
                const currentPos = new kakao.maps.LatLng(lat, lon);
                
                map.setCenter(currentPos); // 현재 위치로 지도 이동
                new kakao.maps.Marker({ map: map, position: currentPos }); // 내 위치 마커
            }, function(err) {
                console.error("위치 권한 거부 또는 오류:", err);
                alert("위치 정보를 사용할 수 없습니다. 기본 위치로 표시합니다.");
            });
        }
    }

    function searchPlaces() {
        const query = document.getElementById('keyword').value;
        if (!query.trim()) return alert("검색어를 입력하세요!");

        placeService.keywordSearch(query, function(data, status) {
            if (status === kakao.maps.services.Status.OK) {
                displayResults(data);
            } else {
                alert("검색 결과가 없습니다.");
            }
        });
    }

    function displayResults(places) {
        const listEl = document.getElementById('result-list');
        const bounds = new kakao.maps.LatLngBounds();
        
        listEl.innerHTML = ""; 
        clearMarkers();

        places.forEach((place, i) => {
            const position = new kakao.maps.LatLng(place.y, place.x);
            const marker = new kakao.maps.Marker({ position: position, map: map });
            markers.push(marker);

            const li = document.createElement('li');
            li.className = 'list-item';
            li.innerHTML = `<strong>${place.place_name}</strong><br><small>${place.address_name}</small>`;
            li.onclick = () => map.panTo(position);
            
            listEl.appendChild(li);
            bounds.extend(position);
        });

        map.setBounds(bounds); // 검색 결과에 맞게 지도 범위 조정
    }

    function clearMarkers() {
        markers.forEach(m => m.setMap(null));
        markers = [];
    }
</script>
</body>
</html>
